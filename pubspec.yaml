name: road_sos
description: "Emergency Road Accident Response App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  sqflite: ^2.3.0
  path: ^1.8.3
  geolocator: ^10.1.0
  sensors_plus: ^4.0.2
  url_launcher: ^6.2.1
  flutter_dotenv: ^5.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  sqflite_common_ffi: ^2.4.0+2
  http: ^1.6.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
